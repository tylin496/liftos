<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
  <title>LiftOS</title>
  <link rel="icon" type="image/png" sizes="32x32" href="./LiftOS/icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="./LiftOS/icons/favicon-16.png" />
  <link rel="icon" href="./favicon.png" />
  <link rel="apple-touch-icon" href="./icon-pwa.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap">
  <link rel="stylesheet" href="./style.css?v=20260625">
</head>
<body class="auth-locked">
  <section id="accessGate" class="access-gate" aria-label="Sign in">
    <div class="access-card">
      <span class="access-label">Private Tracker</span>
      <h2>Sign in</h2>
      <p>Use your allowed Google account to open this tracker.</p>
      <button id="googleSignInBtn" class="google-sign-in-btn" type="button" disabled>
        <svg class="google-sign-in-icon" width="20" height="20" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C2.38 15.62 0 19.62 0 24c0 4.38.38 8.38 2.55 12.78l7.98-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        <span>Sign in with Google</span>
      </button>
      <p id="accessError" class="access-error"></p>
    </div>
  </section>

  <main class="app-shell">
    <header class="app-header">
      <div class="app-title-block">
        <div class="app-title">
          <img class="app-logo" src="./favicon.png" width="22" height="22" alt="" aria-hidden="true" />
          <h1>LiftOS</h1>
        </div>
        <p class="subtle-text">Know your numbers</p>
      </div>
      <div class="app-header-actions">
        <button id="copyAllDataBtn" class="copy-phase-header-btn copy-all-data-btn" type="button" aria-label="Copy all data" hidden>
          <span class="copy-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" focusable="false">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          </span>
          <span class="check-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" focusable="false">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </span>
        </button>
        <div id="authUserBar" class="auth-user-menu" hidden>
        <button id="authUserTrigger" class="auth-user-trigger" type="button" aria-haspopup="menu" aria-expanded="false" aria-label="Account menu">
          <img id="authUserAvatar" class="auth-user-avatar" alt="" width="28" height="28" hidden />
          <span id="authUserInitial" class="auth-user-initial" aria-hidden="true" hidden></span>
        </button>
        <div id="authUserPopover" class="auth-user-popover" role="menu" hidden>
          <div class="auth-user-popover-info">
            <span id="authUserLabel" class="auth-user-label"></span>
            <span id="authUserEmail" class="auth-user-email"></span>
          </div>
          <button id="signOutBtn" class="auth-user-signout" type="button" role="menuitem">Sign out</button>
        </div>
        </div>
      </div>
    </header>

    <nav class="date-controls" aria-label="Diet day controls">
      <button id="prevDayBtn" class="icon-btn" type="button" aria-label="Previous day">‹</button>
      <button id="diet-day" class="date-field" type="button" aria-label="Selected day">
        <span id="diet-day-label">Today</span>
      </button>
      <button id="nextDayBtn" class="icon-btn" type="button" aria-label="Next day">›</button>
    </nav>

    <div id="swipe-viewport" class="swipe-viewport">
      <div id="swipe-track" class="swipe-track">
        <div class="swipe-panel" id="swipe-panel-prev"></div>
        <div class="swipe-panel" id="swipe-panel-center">
          <div id="daily-result"></div>
          <div id="weekly-summary"></div>
          <div id="adherence-card"></div>
        </div>
        <div class="swipe-panel" id="swipe-panel-next"></div>
      </div>
    </div>

    <div class="form-actions">
      <div id="status" role="status" aria-live="polite"></div>
    </div>

    <div id="quickEntryBackdrop" class="quick-entry-backdrop" hidden></div>
    <div id="calendarBackdrop" class="calendar-backdrop" hidden></div>
    <section id="calendarPanel" class="calendar-panel" role="dialog" aria-modal="true" aria-label="Date picker" hidden>
      <div class="calendar-header">
        <span id="calendarMonthLabel" class="calendar-month-label"></span>
        <button id="jumpTodayBtn" class="calendar-jump-today-btn" type="button">Today</button>
        <button id="closeCalendarBtn" class="icon-btn calendar-close-btn" type="button" aria-label="Close date picker">×</button>
      </div>
      <div class="calendar-weekdays-fixed" aria-hidden="true">
        <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
      </div>
      <div id="calendarGrid" class="calendar-months"></div>
    </section>

    <div id="deleteConfirmBackdrop" class="delete-confirm-backdrop" hidden></div>
    <section id="deleteConfirmPanel" class="delete-confirm-panel" role="dialog" aria-modal="true" aria-labelledby="deleteConfirmTitle" aria-describedby="deleteConfirmText" hidden>
      <div>
        <strong id="deleteConfirmTitle">Delete entry?</strong>
        <p id="deleteConfirmText">This removes the selected day's calories and protein.</p>
      </div>
      <div class="delete-confirm-actions">
        <button id="cancelDeleteBtn" class="secondary-btn" type="button">Cancel</button>
        <button id="confirmDeleteBtn" class="danger-btn" type="button">Delete</button>
      </div>
    </section>

    <form id="today-form" class="settlement-form entry-form-collapsed" hidden aria-hidden="true" inert>
      <label class="input-card" for="calories">
        <span class="input-label">Calories</span>
        <div class="input-value-row">
          <input id="calories" type="number" inputmode="numeric" min="0" step="1" required />
          <span class="input-unit">kcal</span>
        </div>
      </label>

      <label class="input-card" for="protein">
        <span class="input-label">Protein</span>
        <div class="input-value-row">
          <input id="protein" type="number" inputmode="numeric" min="0" step="1" required />
          <span class="input-unit" data-unit="protein">g</span>
        </div>
      </label>

      <div class="entry-actions">
        <button id="saveBtn" class="primary-btn commit-btn" type="submit">Commit today</button>
        <div class="entry-secondary-actions">
          <button id="deleteBtn" class="danger-link" type="button" hidden>Delete</button>
          <button id="cancelBtn" class="cancel-link" type="button">Cancel</button>
        </div>
      </div>
    </form>

    <div id="monthly-viewport">
      <div id="monthly-review"></div>
    </div>

    <details class="settings-panel" id="cutPhasesPanel">
      <summary>
        <div class="program-summary-block">
          <div class="program-summary-header">
            <span class="program-summary-title">Program</span>
            <small id="cutPhaseSummaryName"></small>
          </div>
        </div>
      </summary>
      <div class="cut-phases-form">
        <div class="targets-compact-row" id="targetsCompactRow">
          <span class="targets-compact-item">TDEE <strong id="tdeeSummaryDisplay">—</strong></span>
          <span class="targets-compact-sep">·</span>
          <span class="targets-compact-item">Protein <strong id="proteinSummaryDisplay">—</strong> g</span>
          <button class="targets-compact-edit-btn" id="targetsEditBtn" type="button">Edit</button>
        </div>
        <form id="targets-form" class="targets-form" hidden>
          <label>
            <span>TDEE</span>
            <input id="tdeeInput" type="number" inputmode="numeric" min="1" step="1" />
          </label>
          <label>
            <span>Protein target</span>
            <input id="proteinTargetInput" type="number" inputmode="numeric" min="1" step="1" />
          </label>
          <div class="targets-form-btns">
            <button class="secondary-btn" type="submit">Save</button>
            <button class="targets-cancel-btn" type="button" id="targetsCancelBtn">Cancel</button>
          </div>
        </form>
        <hr class="program-section-divider" />
        <div class="phase-period-row" id="phasePeriodRow">
          <span class="phase-period-display" id="phasePeriodDisplay"></span>
          <button class="phase-period-edit-btn" id="phasePeriodEditBtn" type="button" aria-label="Edit start date">Edit</button>
          <input id="cutStartDateInput" type="date" class="phase-period-date-input" aria-label="Program start date" />
        </div>
        <div class="phase-rows">
          <div class="phase-row" id="cutPhaseRow0">
            <div class="phase-row-info">
              <span class="phase-name">Aggressive Cut</span>
              <span class="phase-calorie-display" id="phaseTarget0"></span>
              <span class="phase-protein-display" id="phaseProtein0"></span>
              <label class="phase-deficit-label">deficit <input id="cutPhaseDeficit0" type="number" inputmode="numeric" min="0" step="1" /> kcal</label>
            </div>
            <button class="phase-activate-btn" id="cutPhaseActivateBtn0" type="button" data-phase-activate="0">Activate</button>
          </div>
          <div class="phase-row" id="cutPhaseRow1">
            <div class="phase-row-info">
              <span class="phase-name">Moderate Cut</span>
              <span class="phase-calorie-display" id="phaseTarget1"></span>
              <span class="phase-protein-display" id="phaseProtein1"></span>
              <label class="phase-deficit-label">deficit <input id="cutPhaseDeficit1" type="number" inputmode="numeric" min="0" step="1" /> kcal</label>
            </div>
            <button class="phase-activate-btn" id="cutPhaseActivateBtn1" type="button" data-phase-activate="1">Activate</button>
          </div>
          <div class="phase-row" id="cutPhaseRow2">
            <div class="phase-row-info">
              <span class="phase-name">Cruise</span>
              <span class="phase-calorie-display" id="phaseTarget2"></span>
              <span class="phase-protein-display" id="phaseProtein2"></span>
              <label class="phase-deficit-label">deficit <input id="cutPhaseDeficit2" type="number" inputmode="numeric" min="0" step="1" /> kcal</label>
            </div>
            <button class="phase-activate-btn" id="cutPhaseActivateBtn2" type="button" data-phase-activate="2">Activate</button>
          </div>
          <div class="phase-row" id="cutPhaseRow3">
            <div class="phase-row-info">
              <span class="phase-name">Maintenance</span>
              <span class="phase-calorie-display" id="phaseTarget3"></span>
              <span class="phase-protein-display" id="phaseProtein3"></span>
              <label class="phase-deficit-label">deficit <input id="cutPhaseDeficit3" type="number" inputmode="numeric" min="0" step="1" /> kcal</label>
            </div>
            <button class="phase-activate-btn" id="cutPhaseActivateBtn3" type="button" data-phase-activate="3">Activate</button>
          </div>
        </div>
      </div>
    </details>


  </main>

  <script src="./config.js"></script>
  <script src="./app.js?v=20260625"></script>
</body>
</html>
