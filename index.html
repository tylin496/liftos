<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icon-pwa.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <!-- Single theme-color meta (no media query) so theme.tsx can keep it in
         sync with the actual applied theme — a manual light/dark override, not
         just the OS scheme. Updated on mount and on every theme change. -->
    <meta name="theme-color" content="#f4f4f6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- black-translucent: lets page content draw under the iOS status bar
         instead of the OS painting an opaque bar above it — needed since
         nothing in-app paints that strip (removed .status-glass). -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>LiftOS</title>
    <script>
      (function () {
        try {
          var pref = localStorage.getItem("liftos-theme");
          var dark = pref === "dark" || (pref !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.dataset.theme = dark ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
